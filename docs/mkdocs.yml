docs_dir: mkdocs
site_name: Hypline
repo_name: princeton-ddss/hypline
repo_url: https://github.com/princeton-ddss/hypline
copyright: Copyright &copy; 2025–2026 The Trustees of Princeton University

theme:
  name: material
  logo: images/logo.svg
  favicon: images/favicon.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - navigation.instant
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - search.highlight
    - search.suggest
    - toc.follow

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra:
  version:
    provider: mike

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [../src]
          options:
            docstring_style: numpy
            show_root_heading: true
            show_source: false
            heading_level: 4
            separate_signature: true
            show_signature_annotations: true

nav:
  - Home: index.md
  - Tutorials:
    - A full run on the example dataset: tutorials/walkthrough.md
  - How-to guides:
    - Filter to specific runs or conditions: how-to/filter.md
    - Regenerate outputs after a fix: how-to/regenerate.md
  - Concepts:
    - The hypline dataset layout: concepts/layout.md
    - Segments and metadata: concepts/segments.md
  - Reference:
    - hypline transcribe: reference/transcribe.md
    - hypline featuregen: reference/featuregen.md
    - hypline confoundgen: reference/confoundgen.md
    - hypline denoise: reference/denoise.md
    - Python API: reference/python-api.md
